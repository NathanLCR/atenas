services:
  atenas:
    build: .
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./memory:/app/memory
      - ./inbox:/app/inbox
      - ./output:/app/output
    env_file:
      - .env
    restart: unless-stopped
