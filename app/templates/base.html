<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block page_title %}Atenas{% endblock %} · Atenas OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Oswald:wght@600;700&family=Playfair+Display:ital,wght@1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <svg class="linen" aria-hidden="true">
      <filter id="linen"><feTurbulence type="fractalNoise" baseFrequency="0.85 0.45" numOctaves="6" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
      <rect width="100%" height="100%" filter="url(#linen)" fill="black"/>
    </svg>

    <div class="frame">
      <header class="mast">
        <div class="greet">
          <span class="script">Greetings from</span>
          <div class="letters">AT EN AS OS</div>
        </div>
        <div class="mast-right">
          <div class="postmark">
            <b>DBS MSc AI</b>
            <span class="pmline"></span>
            <span class="pmd">ATENAS</span>
            <span class="pmline"></span>
            <b>DUBLIN IE</b>
          </div>
          <span class="regen">{{ self.page_title() }}</span>
        </div>
      </header>

      <main>
        {% block main %}{% endblock %}
      </main>

      <footer class="dashboard-nav">
        <a class="nav-item" href="/dashboard/">today</a>
        <a class="nav-item" href="/dashboard/week">week</a>
        <a class="nav-item" href="/dashboard/plan">plan</a>
        <a class="nav-item" href="/dashboard/deadlines">deadlines</a>
        <a class="nav-item" href="/dashboard/data">data</a>
        <a class="nav-item" href="/dashboard/notes">notes</a>
        <a class="nav-item" href="/dashboard/files">files</a>
        <a class="nav-item" href="/dashboard/search">search</a>
        <a class="nav-item" href="/dashboard/retrieval">retrieval</a>
        <a class="nav-item" href="/dashboard/llm">llm</a>
        <a class="nav-item" href="/dashboard/traces">traces</a>
        <a class="nav-item" href="/dashboard/logs">logs</a>
      </footer>
    </div>
  </body>
</html>
