<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Atenas{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-brand">Atenas</div>
        <nav aria-label="Dashboard">
          <a href="/dashboard/">Overview</a>
          <a href="/dashboard/week">Week</a>
          <a href="/dashboard/deadlines">Deadlines</a>
          <a href="/dashboard/plan">Plan</a>
          <a href="/dashboard/data">Data</a>
          <a href="/dashboard/notes">Notes</a>
          <a href="/dashboard/files">Files</a>
          <a href="/dashboard/search">Search</a>
          <a href="/dashboard/logs">Logs</a>
        </nav>
      </aside>
      <div class="page">
        <header class="topbar">
          <h1>{% block page_title %}Dashboard{% endblock %}</h1>
        </header>
        <main>
          {% block main %}{% endblock %}
        </main>
      </div>
    </div>
  </body>
</html>
